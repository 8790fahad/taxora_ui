name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site into docs/
        env:
          VITE_API_URL: ${{ vars.API_URL }}
        run: |
          npm run build
          rm -rf docs
          cp -r dist docs

      - name: Commit docs for GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Deploy production site to docs/
          file_pattern: docs/**
          branch: main

      - name: Publish to gh-pages branch (optional mirror)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
          commit-message: Deploy production build
