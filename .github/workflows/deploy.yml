name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'brand/**'
      - 'docs/**'
      - 'index.html'
      - '404.html'
      - 'CNAME'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to repository root
        env:
          VITE_API_URL: ${{ vars.API_URL }}
        run: node scripts/publish-root.mjs

      - name: Commit production site files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Deploy production site to repository root
          file_pattern: index.html assets/** brand/** docs/** 404.html CNAME .nojekyll
          branch: main
